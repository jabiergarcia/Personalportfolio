    <!-- Redirección automática a home después de 1 segundo -->
    <meta http-equiv="refresh" content="1;url=https://jabiergarcia.com">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #fffbf8 0%, #ffccb6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #10252a;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            background: #10252a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #fffbf8;
            box-shadow: 0 10px 30px rgba(16, 37, 42, 0.2);
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #10252a;
        }
        
        p {
            font-size: 18px;
            line-height: 1.6;
            color: #2d5367;
            margin-bottom: 30px;
        }
        
        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #ffccb6;
            border-top-color: #70b8ba;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .redirect-info {
            font-size: 14px;
            color: #2d5367;
            margin-top: 20px;
            opacity: 0.8;
        }
        
        .instant-redirect {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #70b8ba;
            color: #fffbf8;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .instant-redirect:hover {
            background: #5da8aa;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(112, 184, 186, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">JG</div>
        <h1>Jabier García Sanz</h1>
        <p>UX/UI Designer especializado en Design Systems y experiencias digitales</p>
        <div class="loading"></div>
        <p class="redirect-info">Redirigiendo al portfolio...</p>
        <a href="https://jabiergarcia.com" class="instant-redirect">Ir ahora →</a>
    </div>
    
    <script>
        // Redirección inmediata si JavaScript está habilitado
        // (La meta tag refresh es el fallback para crawlers)
        setTimeout(function() {
            window.location.href = 'https://jabiergarcia.com';
        }, 1000);
    </script>
</body>
</html>
